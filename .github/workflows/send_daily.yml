name: Send Daily NMT Question

on:
  schedule:
    - cron: '0 * * * *'  # кожної години
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send question
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_IDS: ${{ secrets.CHAT_IDS }}
        run: python send_telegram.py

      - name: Persist sent history
        run: |
          git config user.name "nmt-daily-bot"
          git config user.email "bot@nmt-daily"
          git add data/sent.json
          git diff --staged --quiet || \
            git commit -m "chore: update sent history [skip ci]"
          git push
