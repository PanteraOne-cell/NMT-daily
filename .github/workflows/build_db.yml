name: Build Questions DB

on:
  schedule:
    - cron: "0 3 * * 1"   # щопонеділка о 03:00 UTC
  workflow_dispatch:
    inputs:
      subject:
        description: "Предмет"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - ukrainian
          - math
          - history
          - biology
      target:
        description: "Ціль (питань у банку)"
        required: false
        default: "600"

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests

      - name: Backfill questions
        run: |
          python scripts/backfill.py \
            --subject ${{ inputs.subject || 'all' }} \
            --target ${{ inputs.target || '600' }}

      - name: Commit & push
        run: |
          git config user.name "nmt-daily-bot"
          git config user.email "bot@nmt-daily"
          git add bank/
          git diff --staged --quiet || \
            git commit -m "chore: backfill questions [skip ci]"
          git push
